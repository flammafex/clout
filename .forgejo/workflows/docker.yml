name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_PREFIX: git.carpocratian.org/sibyl/clout

jobs:
  # ─── CI Gate: lint + build + test ───────────────────────────
  # Runs on every PR and push to main. Docker images won't build
  # if this fails (build job has needs: check).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ─── Docker Build & Push ────────────────────────────────────
  # Only runs after CI gate passes, and only on push to main/tags
  # (not on PRs — we don't want to push images for every PR).
  build:
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: runtime
            image: git.carpocratian.org/sibyl/clout
          - target: cli
            image: git.carpocratian.org/sibyl/clout-cli

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Forgejo registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.carpocratian.org -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REF="${{ github.ref }}"
          TAGS="${{ matrix.image }}:${SHA}"
          if [ "$REF" = "refs/heads/main" ]; then
            TAGS="${TAGS},${{ matrix.image }}:latest"
          fi
          if echo "$REF" | grep -q '^refs/tags/v'; then
            VERSION="${REF#refs/tags/v}"
            TAGS="${TAGS},${{ matrix.image }}:${VERSION}"
            TAGS="${TAGS},${{ matrix.image }}:$(echo "$VERSION" | cut -d. -f1-2)"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IFS=',' read -ra TAG_LIST <<< "${{ steps.tags.outputs.tags }}"
          TAG_ARGS=""
          for t in "${TAG_LIST[@]}"; do TAG_ARGS="$TAG_ARGS -t $t"; done
          docker build $TAG_ARGS --target ${{ matrix.target }} .
          for t in "${TAG_LIST[@]}"; do docker push "$t"; done
